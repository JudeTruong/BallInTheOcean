<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="post-container">
    <a href="index.html" class="back-link">← Back to all posts</a>

    <article id="post-content" class="post-full">
      <p>Loading post...</p>
    </article>
  </main>

  <script>
    async function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");

      const postContent = document.getElementById("post-content");

      if (!slug) {
        postContent.innerHTML = "<p>Post not found.</p>";
        return;
      }

      const postsResponse = await fetch("posts.json");
      const posts = await postsResponse.json();

      const post = posts.find(item => item.slug === slug);

      if (!post) {
        postContent.innerHTML = "<p>Post not found.</p>";
        return;
      }

      document.title = post.title;

      const response = await fetch(post.file);
      const text = await response.text();

      postContent.innerHTML = renderTextPost(text, post);
    }

    function renderTextPost(text, post) {
      const body = text.replace(/^---\s*[\s\S]*?\s*---/, "").trim();

      const blocks = body.split(/\n\s*\n/);

      const renderedBlocks = blocks.map(block => {
        const trimmed = block.trim();

        if (trimmed.startsWith("## ")) {
          return `<h2>${escapeHtml(trimmed.replace("## ", ""))}</h2>`;
        }

        if (trimmed.startsWith("# ")) {
          return `<h1>${escapeHtml(trimmed.replace("# ", ""))}</h1>`;
        }

        return `<p>${escapeHtml(trimmed).replace(/\n/g, "<br>")}</p>`;
      }).join("");

      return `
        <h1>${escapeHtml(post.title)}</h1>
        <p class="meta">${formatDate(post.date)} · ${escapeHtml(post.category)}</p>
        ${renderedBlocks}
      `;
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateString) {
      const date = new Date(dateString);

      if (Number.isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleDateString("en-CA", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    loadPost();
  </script>
</body>
</html>
